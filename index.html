<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History Activities</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 2rem;
    }

    p {
      color: #555;
      margin-bottom: 28px;
    }

    .menu-button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 16px;
      font-size: 1.1rem;
      text-decoration: none;
      background: #2563eb;
      color: white;
      border-radius: 12px;
      transition: 0.2s ease;
      box-sizing: border-box;
    }

    .menu-button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>History Activities</h1>
    <p>Select an activity to begin.</p>

    <a class="menu-button" href="hitler-game/">Rise of Hitler Mystery</a>
    <a class="menu-button" href="cold-war-game/">Cold War Decision Game</a>
  </div>
</body>
</html>
