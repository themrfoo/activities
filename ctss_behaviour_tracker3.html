<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Class Tracker"/>
<meta name="theme-color" content="#F5F4F0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link id="pwa-manifest" rel="manifest"/>
<link id="apple-touch-icon" rel="apple-touch-icon"/>
<title>Class Behaviour Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #F5F4F0; --surface: #FFFFFF; --surface2: #EEECEA;
    --text: #1A1917; --text2: #6B6960; --text3: #A09E96;
    --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.14);
    --red: #D94F3D; --red-bg: #FDF0EE; --red-text: #A8301F;
    --amber: #C47B1A; --amber-bg: #FDF5E6; --amber-text: #8F540C;
    --blue: #2A6ED4; --blue-bg: #EEF3FD; --blue-text: #1A4E9E;
    --purple: #6B4FBB; --purple-bg: #F2EEFB; --purple-text: #4A3186;
    --orange: #C45D1A; --orange-bg: #FDF1E6; --orange-text: #8F400C;
    --green: #1E7E34; --green-bg: #EAF5ED; --green-text: #155724;
    --radius: 14px; --radius-sm: 9px;
    --font: 'DM Sans', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121210; --surface: #1E1D1A; --surface2: #2A2926;
      --text: #F0EEE8; --text2: #9E9C94; --text3: #6B6960;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.13);
      --red-bg: #2A1410; --red-text: #F5907E;
      --amber-bg: #261A08; --amber-text: #F0B060;
      --blue-bg: #0E1B30; --blue-text: #7AABF5;
      --purple-bg: #1A1228; --purple-text: #B09AE8;
      --orange-bg: #2A1608; --orange-text: #F0A060;
      --green-bg: #0C1F10; --green-text: #6FCF8A;
    }
  }
  html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); overflow: hidden; }
  #app { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
  .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .screen.active { display: flex; }
  .header {
    padding: 16px 16px 12px; display: flex; align-items: center; gap: 8px;
    background: var(--bg); border-bottom: 0.5px solid var(--border); flex-shrink: 0;
  }
  .header-title { font-size: 18px; font-weight: 600; flex: 1; color: var(--text); }
  .header-sub { font-size: 13px; color: var(--text2); margin-top: 1px; }
  .btn-ghost {
    background: var(--surface); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); padding: 8px 12px;
    font-size: 13px; font-weight: 500; color: var(--text);
    font-family: var(--font); cursor: pointer; white-space: nowrap;
  }
  .btn-ghost:active { opacity: 0.7; transform: scale(0.97); }
  .btn-danger { color: var(--red-text); border-color: var(--red); background: var(--red-bg); }
  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px; }

  /* HOME BANNER */
  .home-banner {
    margin: 10px 14px 4px; padding: 10px 14px;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .home-banner-label { font-size: 13px; color: var(--text2); }
  .home-banner-label strong { color: var(--text); font-weight: 600; }
  .next-week-btn {
    font-size: 13px; font-weight: 600; color: var(--blue-text);
    background: var(--blue-bg); border: 0.5px solid var(--blue);
    border-radius: var(--radius-sm); padding: 6px 12px;
    font-family: var(--font); cursor: pointer;
  }
  .next-week-btn:active { opacity: 0.7; }

  /* CLASS GRID */
  .class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .class-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 16px 14px; cursor: pointer; min-height: 96px;
    display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.1s;
  }
  .class-card:active { transform: scale(0.96); }
  .class-card-name { font-size: 17px; font-weight: 600; color: var(--text); }
  .class-card-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .class-badge { display: inline-block; margin-top: 10px; font-size: 11px; font-weight: 600; border-radius: 99px; padding: 2px 9px; }
  .class-badge.incident { background: var(--red-bg); color: var(--red-text); }
  .class-badge.watch { background: var(--orange-bg); color: var(--orange-text); }
  .class-badge.none { background: var(--surface2); color: var(--text3); }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 15px; line-height: 1.6; }
  .empty strong { display: block; font-size: 17px; color: var(--text); margin-bottom: 6px; }

  /* LESSON PICKER PANEL */
  .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10; }
  .backdrop.open { display: block; }
  .lesson-picker {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 0.5px solid var(--border2);
    border-radius: 20px 20px 0 0; padding: 14px 16px 34px; z-index: 12;
  }
  .lesson-picker.open { display: block; }
  .picker-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 0 auto 16px; }
  .picker-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 16px; text-align: center; }
  .picker-row { margin-bottom: 14px; }
  .picker-row-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .picker-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    padding: 10px 16px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); font-size: 15px; font-weight: 500;
    font-family: var(--font); cursor: pointer; color: var(--text2); background: var(--surface2);
    transition: all 0.1s;
  }
  .chip:active { transform: scale(0.95); }
  .chip.selected { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue); font-weight: 600; }
  .picker-confirm {
    width: 100%; margin-top: 6px; padding: 16px; border-radius: var(--radius-sm);
    font-size: 16px; font-weight: 600; font-family: var(--font);
    color: #fff; background: var(--blue); border: none; cursor: pointer;
  }
  .picker-confirm:active { opacity: 0.8; }
  .picker-confirm:disabled { background: var(--surface2); color: var(--text3); cursor: default; }

  /* LESSON BANNER (inside class screen) */
  .lesson-banner {
    margin: 10px 14px 4px; padding: 10px 14px;
    background: var(--green-bg); border: 0.5px solid var(--green);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    cursor: pointer;
  }
  .lesson-banner:active { opacity: 0.8; }
  .lesson-banner-text { font-size: 13px; font-weight: 600; color: var(--green-text); }
  .lesson-banner-change { font-size: 12px; color: var(--green-text); opacity: 0.7; }

  /* STUDENTS */
  .student-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
  .student-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 6px 10px;
    cursor: pointer; text-align: center; min-height: 72px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; transition: transform 0.1s; gap: 4px;
  }
  .student-btn:active { transform: scale(0.93); }
  .student-btn.dragging {
    opacity: 0.4; transform: scale(0.95);
  }
  .student-btn.drag-over {
    border-color: var(--blue); border-width: 2px;
    background: var(--blue-bg);
  }
  .student-btn.drag-ready {
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    transform: scale(1.06);
    z-index: 5; position: relative;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .student-btn.on-watch { border-color: var(--orange); border-width: 1.5px; background: var(--orange-bg); }
  .student-btn.on-watch.flagged { border-color: var(--red); background: var(--red-bg); }
  .student-btn-name { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .offence-badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 3px; margin-top: 4px; }
  .ob { font-size: 10px; font-weight: 600; border-radius: 99px; padding: 1px 5px; min-width: 16px; text-align: center; }
  .ob.c-red    { background: var(--red);    color: #fff; }
  .ob.c-amber  { background: var(--amber);  color: #fff; }
  .ob.c-blue   { background: var(--blue);   color: #fff; }
  .ob.c-purple { background: var(--purple); color: #fff; }
  .ob.c-orange { background: var(--orange); color: #fff; }
  .ob.c-gray   { background: var(--text2);  color: #fff; }
  .ob.ob-watch { opacity: 0.45; outline: 1.5px solid currentColor; outline-offset: -2px; }
  .log-dot.c-red    { background: var(--red); }
  .log-dot.c-amber  { background: var(--amber); }
  .log-dot.c-blue   { background: var(--blue); }
  .log-dot.c-purple { background: var(--purple); }
  .log-dot.c-orange { background: var(--orange); }
  .log-dot.c-gray   { background: var(--text2); }
  .watch-tag {
    font-size: 10px; font-weight: 600; color: var(--orange-text);
    background: transparent; border-radius: 99px; padding: 1px 6px;
    border: 0.5px solid var(--orange);
  }
  .student-btn.flagged .watch-tag { color: var(--red-text); border-color: var(--red); }

  /* BEHAVIOUR PANEL */
  .beh-panel {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 0.5px solid var(--border2);
    border-radius: 20px 20px 0 0; padding: 14px 14px 30px; z-index: 11;
  }
  .beh-panel.open { display: block; }
  .panel-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 0 auto 14px; }
  .panel-student { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .panel-watchinfo {
    font-size: 12px; color: var(--orange-text); margin-bottom: 12px;
    background: var(--orange-bg); border-radius: var(--radius-sm);
    padding: 7px 10px; border: 0.5px solid var(--orange);
  }
  .beh-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .beh-btn {
    padding: 18px 10px; border-radius: var(--radius); border: 1px solid;
    font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; text-align: center; transition: transform 0.1s;
  }
  .beh-btn:active { transform: scale(0.95); }
  .b-device   { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple); }
  .b-late     { background: var(--amber-bg);  color: var(--amber-text);  border-color: var(--amber); }
  .b-attire   { background: var(--blue-bg);   color: var(--blue-text);   border-color: var(--blue); }
  .b-rude     { background: var(--red-bg);    color: var(--red-text);    border-color: var(--red); }
  .b-vulgar   { background: var(--red-bg);    color: var(--red-text);    border-color: var(--red); }
  .b-sleep    { background: var(--surface2);  color: var(--text2);       border-color: var(--border2); }
  .b-talk     { background: var(--amber-bg);  color: var(--amber-text);  border-color: var(--amber); }
  .b-nowork   { background: var(--blue-bg);   color: var(--blue-text);   border-color: var(--blue); }
  .b-disrupt  { background: var(--red-bg);    color: var(--red-text);    border-color: var(--red); }
  .b-nomats   { background: var(--orange-bg); color: var(--orange-text); border-color: var(--orange); }
  .b-slow     { background: var(--orange-bg); color: var(--orange-text); border-color: var(--orange); }
  .cancel-btn {
    width: 100%; margin-top: 10px; padding: 15px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); font-size: 15px; font-family: var(--font);
    color: var(--text2); background: transparent; cursor: pointer;
  }
  .cancel-btn:active { opacity: 0.6; }
  .history-btn {
    width: 100%; margin-top: 8px; padding: 13px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border); font-size: 14px; font-weight: 500; font-family: var(--font);
    color: var(--blue-text); background: var(--blue-bg); cursor: pointer;
  }
  .history-btn:active { opacity: 0.7; }
  .panel-logged-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .panel-logged-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    background: var(--surface2); margin-bottom: 5px;
  }
  .panel-logged-type { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
  .panel-logged-time { font-size: 12px; color: var(--text3); }
  .panel-logged-del {
    font-size: 13px; font-weight: 600; color: var(--red-text);
    background: var(--red-bg); border: 0.5px solid var(--red);
    border-radius: var(--radius-sm); padding: 4px 10px;
    cursor: pointer; font-family: var(--font);
  }

  /* LOG */
  .section-title {
    font-size: 12px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.06em; padding: 0 2px; margin: 18px 0 8px;
  }
  .section-title:first-child { margin-top: 0; }
  .summary-row {
    display: flex; align-items: center;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 7px; gap: 8px;
  }
  .summary-row.over3 { border-color: var(--red); }
  .summary-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
  .summary-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .summary-count { font-size: 13px; font-weight: 600; background: var(--red-bg); color: var(--red-text); border-radius: 99px; padding: 2px 10px; }
  .strikes-pill { font-size: 11px; font-weight: 600; background: var(--orange-bg); color: var(--orange-text); border: 0.5px solid var(--orange); border-radius: 99px; padding: 2px 8px; white-space: nowrap; }
  .carried-card { background: var(--orange-bg); border: 0.5px solid var(--orange); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 7px; }
  .carried-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .pill { font-size: 12px; font-weight: 600; border-radius: 99px; padding: 3px 10px; }
  .pill.c-red    { background: var(--red-bg);    color: var(--red-text); }
  .pill.c-amber  { background: var(--amber-bg);  color: var(--amber-text); }
  .pill.c-blue   { background: var(--blue-bg);   color: var(--blue-text); }
  .pill.c-purple { background: var(--purple-bg); color: var(--purple-text); }
  .pill.c-orange { background: var(--orange-bg); color: var(--orange-text); }
  .pill.c-gray   { background: var(--surface2);  color: var(--text2); }
  .pill.strikes  { background: var(--orange-bg); color: var(--orange-text); border: 0.5px solid var(--orange); }
  .log-item { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
  .log-item:last-child { border-bottom: none; }
  .log-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .log-text { flex: 1; font-size: 14px; color: var(--text); line-height: 1.4; }
  .log-text span { color: var(--text2); font-size: 13px; }
  .log-time { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .log-del { font-size: 16px; color: var(--text3); cursor: pointer; padding: 4px 6px; }
  .lesson-group-header {
    font-size: 13px; font-weight: 600; color: var(--text2);
    padding: 10px 0 6px; margin-top: 6px;
  }

  /* WATCHLIST */
  .watch-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px; }
  .watch-item-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .watch-item-class { font-size: 12px; color: var(--text2); margin-top: 2px; margin-bottom: 10px; }

  /* STUDENT HISTORY */
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 10px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .history-block { margin-bottom: 16px; }
  .history-block-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 7px; padding: 0 2px; }
  .history-block-title.current { color: var(--blue-text); }
  .history-inc-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 5px; }
  .history-type { flex: 1; font-size: 14px; color: var(--text); }
  .history-meta { font-size: 12px; color: var(--text3); text-align: right; line-height: 1.5; }

  /* SETUP */
  .setup-tabs { display: flex; gap: 6px; padding: 14px 14px 0; flex-shrink: 0; }
  .setup-tab { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); font-size: 14px; font-weight: 500; font-family: var(--font); color: var(--text2); background: transparent; cursor: pointer; }
  .setup-tab.active { background: var(--surface); color: var(--text); border-color: var(--border2); }
  .form-group { margin-bottom: 10px; }
  .form-input { width: 100%; padding: 13px 14px; font-size: 15px; font-family: var(--font); color: var(--text); background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); outline: none; }
  .form-input:focus { border-color: var(--blue); }
  .form-submit { width: 100%; padding: 14px; font-size: 15px; font-weight: 600; font-family: var(--font); color: var(--text); background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); cursor: pointer; }
  .form-submit:active { opacity: 0.7; }
  .setup-list-item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
  .setup-list-item:last-child { border-bottom: none; }
  .setup-list-text { font-size: 14px; color: var(--text); }
  .setup-list-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .list-del { font-size: 16px; color: var(--text3); cursor: pointer; padding: 4px 8px; }
  .class-select { width: 100%; padding: 13px 14px; font-size: 15px; font-family: var(--font); color: var(--text); background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); margin-bottom: 10px; outline: none; }
  .inline-row { display: flex; gap: 8px; }
  .inline-row .form-input { flex: 1; }
  .inline-add { padding: 13px 16px; font-size: 15px; font-weight: 600; font-family: var(--font); color: var(--text); background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); cursor: pointer; white-space: nowrap; }
  .divider { height: 0.5px; background: var(--border); margin: 14px 0; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); font-size: 14px; font-weight: 500; padding: 10px 18px; border-radius: 99px; z-index: 20; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; font-family: var(--font); }
  .toast.show { opacity: 1; }
  select option { background: var(--surface); color: var(--text); }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="header">
      <div style="flex:1"><div class="header-title">Classes</div></div>
      <button class="btn-ghost" onclick="showScreen('screen-watchlist')">Watchlist</button>
      <button class="btn-ghost" onclick="showScreen('screen-setup')">Setup</button>
    </div>
    <div class="home-banner">
      <div class="home-banner-label">Term <strong id="home-term">2</strong> · Week <strong id="home-week">2</strong></div>
      <button class="next-week-btn" onclick="confirmNextWeek()">Next Week</button>
    </div>
    <div class="scroll-area">
      <div class="class-grid" id="class-grid"></div>
      <div id="home-empty" class="empty" style="display:none"><strong>No classes yet</strong>Tap Setup to add your classes and students.</div>
    </div>
  </div>

  <!-- STUDENTS -->
  <div id="screen-students" class="screen">
    <div class="header">
      <button class="btn-ghost" onclick="showScreen('screen-home')">← Back</button>
      <div style="flex:1">
        <div class="header-title" id="class-title">Class</div>
        <div class="header-sub" id="class-subtitle"></div>
      </div>
      <button class="btn-ghost" onclick="showLog()">Log</button>
    </div>
    <div class="lesson-banner" id="lesson-banner" onclick="openLessonPicker(false)">
      <div class="lesson-banner-text" id="lesson-banner-text">Tap to set lesson</div>
      <div class="lesson-banner-change">Change</div>
    </div>
    <div class="scroll-area"><div class="student-grid" id="student-grid"></div></div>
  </div>

  <!-- LOG -->
  <div id="screen-log" class="screen">
    <div class="header">
      <button class="btn-ghost" onclick="showScreen('screen-students')">← Back</button>
      <div class="header-title">Incident Log</div>
      <button class="btn-ghost btn-danger" onclick="clearClassLog()">Clear</button>
    </div>

  </div>

  <!-- WATCHLIST -->
  <div id="screen-watchlist" class="screen">
    <div class="header">
      <button class="btn-ghost" onclick="showScreen('screen-home')">← Back</button>
      <div class="header-title">Watchlist</div>
    </div>
    <div class="scroll-area" id="watchlist-content"></div>
  </div>

  <!-- STUDENT HISTORY -->
  <div id="screen-student-history" class="screen">
    <div class="header">
      <button class="btn-ghost" onclick="showScreen('screen-students')">← Back</button>
      <div style="flex:1">
        <div class="header-title" id="history-student-name"></div>
        <div class="header-sub" id="history-class-name"></div>
      </div>

    <div class="scroll-area" id="history-content"></div>

  <!-- SETUP -->
  <div id="screen-setup" class="screen">
    <div class="header">
      <button class="btn-ghost" onclick="showScreen('screen-home')">← Done</button>
      <div class="header-title">Setup</div>
    </div>
    <div class="setup-tabs">
      <button class="setup-tab active" id="tab-classes" onclick="switchTab('classes')">Classes</button>
      <button class="setup-tab" id="tab-students" onclick="switchTab('students')">Students</button>
    </div>
    <div class="scroll-area">
      <div id="setup-classes">
        <div class="form-group"><input class="form-input" id="new-class-name" placeholder="Class name e.g. 3E1" maxlength="20"/></div>
        <div class="form-group"><input class="form-input" id="new-class-subject" placeholder="Subject e.g. Social Studies" maxlength="40"/></div>
        <button class="form-submit" onclick="addClass()">Add class</button>

        <div class="inline-row form-group">
          <input class="form-input" id="new-student" placeholder="Student name" maxlength="40"/>
          <button class="inline-add" onclick="addStudent()">Add</button>
        </div>
        <div id="student-list"></div>
      </div>
    </div>
  </div>

</div>

<div class="backdrop" id="backdrop" onclick="closeAllPanels()"></div>

<div class="lesson-picker" id="lesson-picker">

  <div class="picker-title">Set lesson</div>
  <div class="picker-row">
    <div class="picker-row-label">Term</div>
    <div class="picker-chips" id="chips-term">
      <button class="chip" onclick="selectChip('term',1)">T1</button>
      <button class="chip" onclick="selectChip('term',2)">T2</button>
      <button class="chip" onclick="selectChip('term',3)">T3</button>
      <button class="chip" onclick="selectChip('term',4)">T4</button>
    </div>
  </div>
  <div class="picker-row">
    <div class="picker-row-label">Week</div>
    <div class="picker-chips" id="chips-week">
      <button class="chip" onclick="selectChip('week',1)">W1</button>
      <button class="chip" onclick="selectChip('week',2)">W2</button>
      <button class="chip" onclick="selectChip('week',3)">W3</button>
      <button class="chip" onclick="selectChip('week',4)">W4</button>
      <button class="chip" onclick="selectChip('week',5)">W5</button>
      <button class="chip" onclick="selectChip('week',6)">W6</button>
      <button class="chip" onclick="selectChip('week',7)">W7</button>
      <button class="chip" onclick="selectChip('week',8)">W8</button>
      <button class="chip" onclick="selectChip('week',9)">W9</button>
      <button class="chip" onclick="selectChip('week',10)">W10</button>
    </div>
  </div>
  <div class="picker-row">
    <div class="picker-row-label">Lesson</div>
    <div class="picker-chips" id="chips-lesson">

      <button class="chip" onclick="selectChip('lesson',2)">L2</button>
    </div>

  <button class="cancel-btn" onclick="cancelLessonPicker()" style="margin-top:8px">Cancel</button>
</div>

<!-- BEHAVIOUR PANEL -->
<div class="beh-panel" id="beh-panel">
  <div class="panel-handle"></div>
  <div class="panel-student" id="panel-name"></div>
  <div class="panel-watchinfo" id="panel-watchinfo" style="display:none"></div>
  <div id="panel-logged" style="display:none;margin-bottom:12px"></div>
  <div class="beh-grid">
    <button class="beh-btn b-rude" onclick="logBehaviour('Rude')">Rude</button>
    <button class="beh-btn b-vulgar" onclick="logBehaviour('Vulgarity')">Vulgarity</button>
    <button class="beh-btn b-disrupt" onclick="logBehaviour('Disruptive')">Disruptive</button>
    <button class="beh-btn b-talk" onclick="logBehaviour('Talking')">Talking</button>
    <button class="beh-btn b-late" onclick="logBehaviour('Late')">Late</button>
    <button class="beh-btn b-nowork" onclick="logBehaviour('No Work')">No Work</button>
    <button class="beh-btn b-attire" onclick="logBehaviour('Attire')">Attire</button>
    <button class="beh-btn b-device" onclick="logBehaviour('Device')">Device</button>
    <button class="beh-btn b-nomats" onclick="logBehaviour('No Materials')">No Materials</button>
    <button class="beh-btn b-slow" onclick="logBehaviour('Slow Start')">Slow Start</button>
    <button class="beh-btn b-sleep" onclick="logBehaviour('Sleeping')">Sleeping</button>
  </div>
  <button class="cancel-btn" onclick="closeAllPanels()">Cancel</button>
  <button class="history-btn" onclick="openStudentHistory()">View full history</button>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE = 'ctss_v4';
let state = {
  classes: [], incidents: [], watchlist: {},
  currentTerm: 2, currentWeek: 2
};
// session-only lesson context (not persisted)
let currentClassId = null;
let selectedStudent = null;
let pickerTerm = null, pickerWeek = null, pickerLesson = null;
let currentLesson = null; // { term, week, lesson } for current class session
let pickerIsGlobal = false; // true = called from Next Week, false = per-class

function lessonKey(t, w, l) { return `T${t}W${w}L${l}`; }
function lessonLabel(t, w, l) { return `T${t} · W${w} · L${l}`; }

function save() { try { localStorage.setItem(STORE, JSON.stringify(state)); } catch(e){} }
function load() { try { const d = localStorage.getItem(STORE); if(d) { const p = JSON.parse(d); state = {...state, ...p}; } } catch(e){} }
function wKey(classId, student) { return classId + '|' + student; }
function getWatch(classId, student) { return state.watchlist[wKey(classId, student)] || null; }
function weekInc(classId, student) {
  return state.incidents.filter(i => i.classId === classId && i.student === student && i.term === state.currentTerm && i.week === state.currentWeek);
}
function behClass(t) {
  if (t === 'Disruptive' || t === 'Rude' || t === 'Vulgarity') return 'c-red';
  if (t === 'Talking' || t === 'Late') return 'c-amber';
  if (t === 'No Work' || t === 'Attire') return 'c-blue';
  if (t === 'Device') return 'c-purple';
  if (t === 'No Materials' || t === 'Slow Start') return 'c-orange';
  if (t === 'Sleeping') return 'c-gray';
  return 'c-gray';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

/* NEXT WEEK */
function confirmNextWeek() {
  const nextW = state.currentWeek >= 10 ? 1 : state.currentWeek + 1;
  const nextT = state.currentWeek >= 10 ? state.currentTerm + 1 : state.currentTerm;
  if (!confirm(`Advance to T${nextT} W${nextW}?\n\nStudents with 3+ incidents this week will be added to the watchlist.`)) return;
  doNextWeek(nextT, nextW);
}

function doNextWeek(nextT, nextW) {
  state.classes.forEach(cls => {
    const byStudent = {};
    state.incidents.filter(i => i.classId === cls.id && i.term === state.currentTerm && i.week === state.currentWeek)
      .forEach(i => { if (!byStudent[i.student]) byStudent[i.student] = []; byStudent[i.student].push(i.type); });
    Object.entries(byStudent).forEach(([student, types]) => {
      if (types.length >= 3) {
        const key = wKey(cls.id, student);
        const entry = state.watchlist[key] || { classId: cls.id, student, strikes: 0, typeStrikes: {}, carriedOffences: {} };
        if (!entry.typeStrikes) entry.typeStrikes = {};
        entry.strikes += 1;
        // Count offences this week
        const weekTally = {};
        types.forEach(t => { weekTally[t] = (weekTally[t]||0)+1; });
        // For each type that appeared this week, increment its cumulative strike count
        Object.keys(weekTally).forEach(t => {
          entry.typeStrikes[t] = (entry.typeStrikes[t]||0) + 1;
        });
        entry.carriedOffences = weekTally;
        state.watchlist[key] = entry;
      }
    });
  });
  state.currentTerm = nextT;
  state.currentWeek = nextW;
  save();
  renderHome();
  toast(`Now T${nextT} W${nextW}`);
}

/* SCREENS */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-home') renderHome();
  if (id === 'screen-setup') { renderClassList(); updateClassSelect(); renderStudentList(); }
  if (id === 'screen-watchlist') renderWatchlist();
}

/* HOME */
function renderHome() {
  document.getElementById('home-term').textContent = state.currentTerm;
  document.getElementById('home-week').textContent = state.currentWeek;
  const grid = document.getElementById('class-grid');
  const empty = document.getElementById('home-empty');
  grid.innerHTML = '';
  if (!state.classes.length) { empty.style.display = 'block'; grid.style.display = 'none'; return; }
  empty.style.display = 'none'; grid.style.display = 'grid';
  state.classes.forEach(cls => {
    const n = state.incidents.filter(i => i.classId === cls.id && i.term === state.currentTerm && i.week === state.currentWeek).length;
    const wCount = Object.values(state.watchlist).filter(w => w.classId === cls.id && w.strikes > 0).length;
    let badge = n > 0
      ? `<span class="class-badge incident">${n} incident${n>1?'s':''}</span>`
      : wCount > 0 ? `<span class="class-badge watch">${wCount} on watchlist</span>`
      : `<span class="class-badge none">${cls.students.length} students</span>`;
    const d = document.createElement('div');
    d.className = 'class-card';
    d.innerHTML = `<div><div class="class-card-name">${esc(cls.name)}</div><div class="class-card-sub">${esc(cls.subject)}</div></div>${badge}`;
    d.onclick = () => openClass(cls.id);
    grid.appendChild(d);
  });
}

/* OPEN CLASS — show lesson picker first */
function openClass(id) {
  currentClassId = id;
  currentLesson = null;
  openLessonPicker(false);
}

/* LESSON PICKER */
function openLessonPicker(isGlobal) {
  pickerIsGlobal = isGlobal;
  // Pre-select current global term/week
  pickerTerm = state.currentTerm;
  pickerWeek = state.currentWeek;
  pickerLesson = currentLesson ? currentLesson.lesson : null;
  syncChips();
  document.getElementById('backdrop').classList.add('open');
  document.getElementById('lesson-picker').classList.add('open');
}

function syncChips() {
  ['term','week','lesson'].forEach(type => {
    const val = type === 'term' ? pickerTerm : type === 'week' ? pickerWeek : pickerLesson;
    document.querySelectorAll(`#chips-${type} .chip`).forEach(c => {
      const n = parseInt(c.textContent.replace(/[TWL]/,''));
      c.classList.toggle('selected', n === val);
    });
  });
  const ready = pickerTerm && pickerWeek && pickerLesson;
  document.getElementById('picker-confirm').disabled = !ready;
}

function selectChip(type, val) {
  if (type === 'term') pickerTerm = val;
  else if (type === 'week') pickerWeek = val;
  else pickerLesson = val;
  syncChips();
}

function confirmLesson() {
  if (!pickerTerm || !pickerWeek || !pickerLesson) return;
  closeAllPanels();
  currentLesson = { term: pickerTerm, week: pickerWeek, lesson: pickerLesson };
  document.getElementById('lesson-banner-text').textContent = lessonLabel(pickerTerm, pickerWeek, pickerLesson);
  const cls = state.classes.find(c => c.id === currentClassId);
  document.getElementById('class-title').textContent = cls.name;
  document.getElementById('class-subtitle').textContent = cls.subject;
  renderStudentGrid();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-students').classList.add('active');
}

function closeAllPanels() {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('lesson-picker').classList.remove('open');
  document.getElementById('beh-panel').classList.remove('open');
  selectedStudent = null;
}

function cancelLessonPicker() {
  closeAllPanels();
  // If no lesson set yet (came from home), go back to home
  if (!currentLesson) showScreen('screen-home');
}

/* STUDENTS */
let dragSrc = null, dragLongTimer = null, isDragging = false;
let touchStartX = 0, touchStartY = 0, touchMoved = false;

function renderStudentGrid() {
  const grid = document.getElementById('student-grid');
  grid.innerHTML = '';
  const cls = state.classes.find(c => c.id === currentClassId);
  if (!cls || !cls.students.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><strong>No students</strong>Go to Setup → Students.</div>';
    return;
  }
  cls.students.forEach(name => {
    const inc = weekInc(currentClassId, name);
    const watch = getWatch(currentClassId, name);
    const onWatch = watch && watch.strikes > 0;
    let btnClass = 'student-btn';
    if (inc.length > 0) btnClass += ' flagged';
    else if (onWatch) btnClass += ' on-watch';

    const tally = {};
    inc.forEach(i => { tally[i.type] = (tally[i.type]||0)+1; });
    const badgeOrder = ['Disruptive','Rude','Vulgarity','Talking','Late','No Work','Attire','Device','No Materials','Slow Start','Sleeping'];
    const weekBadges = badgeOrder.filter(t => tally[t]).map(t => `<span class="ob ${behClass(t)}">${tally[t]}</span>`).join('');
    const typeStrikes = (watch && watch.typeStrikes) || {};
    const watchBadges = badgeOrder.filter(t => typeStrikes[t]).map(t => `<span class="ob ${behClass(t)} ob-watch">${typeStrikes[t]}</span>`).join('');
    const allBadges = watchBadges + weekBadges;

    const btn = document.createElement('div');
    btn.className = btnClass;
    btn.dataset.name = name;
    btn.innerHTML = `
      <div class="student-btn-name">${esc(name)}</div>
      ${allBadges ? `<div class="offence-badges">${allBadges}</div>` : ''}`;

    btn.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchMoved = false;
      isDragging = false;
      dragLongTimer = setTimeout(() => {
        if (!touchMoved) {
          isDragging = true;
          dragSrc = btn;
          btn.classList.add('drag-ready');
          navigator.vibrate && navigator.vibrate(40);
        }
      }, 450);
    }, {passive: true});

    btn.addEventListener('touchmove', e => {
      const dx = Math.abs(e.touches[0].clientX - touchStartX);
      const dy = Math.abs(e.touches[0].clientY - touchStartY);
      // If moved more than 8px before long press fires, it's a scroll
      if (dx > 8 || dy > 8) {
        touchMoved = true;
        clearTimeout(dragLongTimer);
      }
      if (!isDragging) return;
      e.preventDefault();
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el && el.closest('.student-btn');
      grid.querySelectorAll('.student-btn').forEach(b => b.classList.remove('drag-over'));
      if (target && target !== dragSrc) target.classList.add('drag-over');
    }, {passive: false});

    btn.addEventListener('touchend', e => {
      clearTimeout(dragLongTimer);
      const wasDragging = isDragging;
      isDragging = false;
      btn.classList.remove('drag-ready');
      grid.querySelectorAll('.student-btn').forEach(b => b.classList.remove('drag-over'));

      if (wasDragging) {
        const touch = e.changedTouches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const target = el && el.closest('.student-btn');
        if (target && target !== dragSrc) {
          const cls2 = state.classes.find(c => c.id === currentClassId);
          const srcIdx = cls2.students.indexOf(dragSrc.dataset.name);
          const tgtIdx = cls2.students.indexOf(target.dataset.name);
          if (srcIdx !== -1 && tgtIdx !== -1) {
            cls2.students.splice(srcIdx, 1);
            cls2.students.splice(tgtIdx, 0, dragSrc.dataset.name);
            save();
            renderStudentGrid();
          }
        }
        dragSrc = null;
        return;
      }

      // Only open panel if finger didn't scroll
      if (!touchMoved) openPanel(name);
    });

    grid.appendChild(btn);
  });
}

/* BEHAVIOUR PANEL */
function openPanel(name) {
  if (!currentLesson) { openLessonPicker(false); return; }
  selectedStudent = name;
  document.getElementById('panel-name').textContent = name;

  // Watchinfo
  const watch = getWatch(currentClassId, name);
  const info = document.getElementById('panel-watchinfo');
  if (watch && watch.strikes > 0) {
    const typeStrikes = watch.typeStrikes || {};
    const badgeOrder = ['Disruptive','Rude','Vulgarity','Talking','Late','No Work','Attire','Device','No Materials','Slow Start','Sleeping'];
    const parts = badgeOrder.filter(t => typeStrikes[t])
      .map(t => `${t} ×${typeStrikes[t]} wk${typeStrikes[t]>1?'s':''}`).join(' · ');
    info.innerHTML = `Watchlist · ${watch.strikes} week${watch.strikes>1?'s':''} flagged<br><span style="opacity:0.8">${parts}</span>`;
    info.style.display = 'block';
  } else { info.style.display = 'none'; }

  // Show this week's logged incidents with delete option
  renderPanelLogged(name);

  document.getElementById('beh-panel').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
}

function renderPanelLogged(name) {
  const inc = weekInc(currentClassId, name);
  const el = document.getElementById('panel-logged');
  if (!inc.length) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  let html = `<div class="panel-logged-title">Logged this week — tap to remove</div>`;
  inc.forEach(i => {
    html += `<div class="panel-logged-item">
      <div class="log-dot ${behClass(i.type)}" style="flex-shrink:0"></div>
      <div class="panel-logged-type">${i.type}</div>
      <div class="panel-logged-time">${i.time}</div>
      <button class="panel-logged-del" onclick="deletePanelIncident(${i.id})">Remove</button>
    </div>`;
  });
  el.innerHTML = html;
}

function deletePanelIncident(id) {
  state.incidents = state.incidents.filter(i => i.id !== id);
  save();
  renderStudentGrid();
  renderPanelLogged(selectedStudent);
  // If no more incidents, hide the logged section
  const inc = weekInc(currentClassId, selectedStudent);
  if (!inc.length) document.getElementById('panel-logged').style.display = 'none';
}

function logBehaviour(type) {
  const now = new Date();
  const student = selectedStudent;
  state.incidents.push({
    id: Date.now(),
    classId: currentClassId,
    student,
    type,
    term: currentLesson.term,
    week: currentLesson.week,
    lesson: currentLesson.lesson,
    time: now.toLocaleTimeString('en-SG', {hour:'2-digit', minute:'2-digit'}),
    date: now.toLocaleDateString('en-SG', {day:'2-digit', month:'short'})
  });
  save(); closeAllPanels(); renderStudentGrid();
  const count = weekInc(currentClassId, student).length;
  toast(student + ' — ' + type + (count >= 3 ? ' ⚠ 3+ this week' : ''));
}

/* LOG */
function showLog() {
  const incidents = state.incidents.filter(i => i.classId === currentClassId && i.term === state.currentTerm && i.week === state.currentWeek);
  const el = document.getElementById('log-content');
  let html = '';

  // Carried over
  const watchEntries = Object.values(state.watchlist).filter(w => w.classId === currentClassId && w.strikes > 0);
  if (watchEntries.length) {
    html += '<div class="section-title">Carried over</div>';
    watchEntries.forEach(w => {
      const pills = Object.entries(w.carriedOffences).map(([t,c]) => `<span class="pill ${behClass(t)}">${t} ×${c}</span>`).join('');
      html += `<div class="carried-card"><div class="carried-name">${esc(w.student)}</div>
        <div class="pill-row">${pills}<span class="pill strikes">×${w.strikes} wk${w.strikes>1?'s':''} flagged</span></div></div>`;
    });
  }

  if (!incidents.length) {
    html += '<div class="empty" style="padding:2rem 0"><strong>All clear this week</strong>No new incidents logged.</div>';
  } else {
    // Summary
    const byStudent = {};
    incidents.forEach(i => { if (!byStudent[i.student]) byStudent[i.student] = []; byStudent[i.student].push(i); });
    const sorted = Object.entries(byStudent).sort((a,b) => b[1].length - a[1].length);
    html += '<div class="section-title" style="margin-top:18px">This week — summary</div>';
    sorted.forEach(([name, inc]) => {
      const tally = {};
      inc.forEach(i => { tally[i.type] = (tally[i.type]||0)+1; });
      const breakdown = Object.entries(tally).map(([t,c]) => `${t} ×${c}`).join(' · ');
      const watch = getWatch(currentClassId, name);
      html += `<div class="summary-row ${inc.length>=3?'over3':''}">
        <div style="flex:1"><div class="summary-name">${esc(name)}</div><div class="summary-sub">${breakdown}</div></div>
        <span class="summary-count">${inc.length}</span>
        ${watch && watch.strikes > 0 ? `<span class="strikes-pill">×${watch.strikes}w</span>` : ''}
      </div>`;
    });

    // By lesson
    const byLesson = {};
    incidents.forEach(i => {
      const k = `T${i.term}W${i.week}L${i.lesson}`;
      if (!byLesson[k]) byLesson[k] = { label: lessonLabel(i.term, i.week, i.lesson), items: [] };
      byLesson[k].items.push(i);
    });
    html += '<div class="section-title" style="margin-top:20px">By lesson</div>';
    Object.values(byLesson).forEach(group => {
      html += `<div class="lesson-group-header">${group.label}</div>`;
      group.items.slice().reverse().forEach(i => {
        html += `<div class="log-item">
          <div class="log-dot ${behClass(i.type)}"></div>
          <div class="log-text"><strong>${esc(i.student)}</strong> <span>— ${i.type}</span></div>
          <div class="log-time">${i.time}</div>
          <div class="log-del" onclick="deleteIncident(${i.id})">✕</div>
        </div>`;
      });
    });
  }
  el.innerHTML = html;
  showScreen('screen-log');
}

function deleteIncident(id) {
  state.incidents = state.incidents.filter(i => i.id !== id);
  save(); showLog(); renderStudentGrid();
}

function clearClassLog() {
  if (!confirm('Clear this week\'s incidents for this class?')) return;
  state.incidents = state.incidents.filter(i => !(i.classId === currentClassId && i.term === state.currentTerm && i.week === state.currentWeek));
  save(); showLog(); renderStudentGrid();
}

/* WATCHLIST */
function renderWatchlist() {
  const el = document.getElementById('watchlist-content');
  const entries = Object.values(state.watchlist).filter(w => w.strikes > 0);
  if (!entries.length) {
    el.innerHTML = '<div class="empty"><strong>Watchlist is empty</strong>Students with 3+ incidents in a week appear here after you advance to the next week.</div>';
    return;
  }
  const byClass = {};
  entries.forEach(w => { if (!byClass[w.classId]) byClass[w.classId] = []; byClass[w.classId].push(w); });
  let html = '';
  Object.entries(byClass).forEach(([cid, ws]) => {
    const cls = state.classes.find(c => c.id == cid);
    html += `<div class="section-title">${cls ? esc(cls.name) + ' — ' + esc(cls.subject) : 'Unknown'}</div>`;
    ws.sort((a,b) => b.strikes - a.strikes).forEach(w => {
      const pills = Object.entries(w.carriedOffences).map(([t,c]) => `<span class="pill ${behClass(t)}">${t} ×${c}</span>`).join('');
      html += `<div class="watch-item">
        <div class="watch-item-name">${esc(w.student)}</div>
        <div class="watch-item-class">Flagged ${w.strikes} week${w.strikes>1?'s':''} total</div>
        <div class="pill-row">${pills}<span class="pill strikes">×${w.strikes} flag${w.strikes>1?'s':''}</span></div>
      </div>`;
    });
  });
  el.innerHTML = html;
}

/* STUDENT HISTORY */
function openStudentHistory() {
  const name = selectedStudent;
  closeAllPanels();
  const cls = state.classes.find(c => c.id === currentClassId);
  document.getElementById('history-student-name').textContent = name;
  document.getElementById('history-class-name').textContent = cls ? cls.name + ' · ' + cls.subject : '';

  const all = state.incidents.filter(i => i.classId === currentClassId && i.student === name);
  const watch = getWatch(currentClassId, name);
  const el = document.getElementById('history-content');

  if (!all.length && (!watch || !watch.strikes)) {
    el.innerHTML = '<div class="empty"><strong>No history yet</strong>No incidents have been logged for this student.</div>';
    showScreen('screen-student-history'); return;
  }

  const typeTally = {};
  all.forEach(i => { typeTally[i.type] = (typeTally[i.type]||0)+1; });
  if (watch) Object.entries(watch.carriedOffences).forEach(([t,c]) => { typeTally[t] = (typeTally[t]||0)+c; });
  const topType = Object.entries(typeTally).sort((a,b)=>b[1]-a[1])[0];
  const totalAll = all.length + (watch ? Object.values(watch.carriedOffences).reduce((a,b)=>a+b,0) : 0);

  let html = `<div class="stat-row">
    <div class="stat-card"><div class="stat-num">${totalAll}</div><div class="stat-label">Total incidents</div></div>
    <div class="stat-card"><div class="stat-num">${watch ? watch.strikes : 0}</div><div class="stat-label">Weeks flagged</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:14px">${topType ? topType[0].split(' ')[0] : '—'}</div><div class="stat-label">Most common</div></div>
  </div>`;

  if (watch && watch.strikes > 0) {
    const pills = Object.entries(watch.carriedOffences).map(([t,c]) => `<span class="pill ${behClass(t)}">${t} ×${c}</span>`).join('');
    html += `<div class="section-title">Watchlist — carried offences</div>
      <div class="carried-card"><div class="pill-row">${pills}<span class="pill strikes">×${watch.strikes} wk${watch.strikes>1?'s':''} flagged</span></div></div>`;
  }

  // Group by Term > Week > Lesson
  const grouped = {};
  all.forEach(i => {
    const tk = `T${i.term}`;
    const wk = `T${i.term}W${i.week}`;
    const lk = `T${i.term}W${i.week}L${i.lesson}`;
    if (!grouped[tk]) grouped[tk] = {};
    if (!grouped[tk][wk]) grouped[tk][wk] = {};
    if (!grouped[tk][wk][lk]) grouped[tk][wk][lk] = [];
    grouped[tk][wk][lk].push(i);
  });

  Object.keys(grouped).sort().reverse().forEach(tk => {
    const termNum = tk.replace('T','');
    html += `<div class="section-title" style="margin-top:20px">Term ${termNum}</div>`;
    Object.keys(grouped[tk]).sort().reverse().forEach(wk => {
      const weekNum = wk.replace(/T\dW/,'');
      const isCurrent = parseInt(termNum) === state.currentTerm && parseInt(weekNum) === state.currentWeek;
      html += `<div class="history-block">`;
      html += `<div class="history-block-title ${isCurrent?'current':''}">Week ${weekNum}${isCurrent?' (current)':''}</div>`;
      Object.keys(grouped[tk][wk]).sort().forEach(lk => {
        const lessonNum = lk.replace(/T\dW\d+L/,'');
        const inc = grouped[tk][wk][lk];
        html += `<div style="font-size:12px;color:var(--text3);margin:6px 0 4px;padding:0 2px">Lesson ${lessonNum} · ${inc.length} incident${inc.length>1?'s':''}</div>`;
        inc.forEach(i => {
          html += `<div class="history-inc-row">
            <div class="log-dot ${behClass(i.type)}"></div>
            <div class="history-type">${i.type}</div>
            <div class="history-meta">${i.date}<br>${i.time}</div>
          </div>`;
        });
      });
      html += `</div>`;
    });
  });

  el.innerHTML = html;
  showScreen('screen-student-history');
}

/* SETUP */
function addClass() {
  const name = document.getElementById('new-class-name').value.trim();
  const subject = document.getElementById('new-class-subject').value.trim();
  if (!name) return;
  state.classes.push({ id: Date.now(), name, subject, students: [] });
  document.getElementById('new-class-name').value = '';
  document.getElementById('new-class-subject').value = '';
  save(); renderClassList(); updateClassSelect(); toast('Class added');
}
function renderClassList() {
  const el = document.getElementById('class-list');
  el.innerHTML = '';
  if (!state.classes.length) { el.innerHTML = '<div style="color:var(--text3);font-size:14px;padding:8px 0">No classes added yet.</div>'; return; }
  state.classes.forEach(cls => {
    const d = document.createElement('div');
    d.className = 'setup-list-item';
    d.innerHTML = `<div style="flex:1"><div class="setup-list-text">${esc(cls.name)}</div>
      <div class="setup-list-sub">${esc(cls.subject)} · ${cls.students.length} students</div></div>
      <div class="list-del" onclick="deleteClass(${cls.id})">✕</div>`;
    el.appendChild(d);
  });
}
function deleteClass(id) {
  if (!confirm('Delete this class and all its data?')) return;
  state.classes = state.classes.filter(c => c.id !== id);
  state.incidents = state.incidents.filter(i => i.classId !== id);
  Object.keys(state.watchlist).forEach(k => { if (state.watchlist[k].classId === id) delete state.watchlist[k]; });
  save(); renderClassList(); updateClassSelect();
}
function updateClassSelect() {
  const sel = document.getElementById('class-select');
  sel.innerHTML = state.classes.length
    ? state.classes.map(c => `<option value="${c.id}">${esc(c.name)} — ${esc(c.subject)}</option>`).join('')
    : '<option value="">No classes yet</option>';
  renderStudentList();
}
function addStudent() {
  const name = document.getElementById('new-student').value.trim();
  const classId = parseInt(document.getElementById('class-select').value);
  if (!name || !classId) return;
  const cls = state.classes.find(c => c.id === classId);
  if (cls && !cls.students.includes(name)) {
    cls.students.push(name); save();
    document.getElementById('new-student').value = '';
    renderStudentList(); renderClassList(); toast(name + ' added');
  }
}
function renderStudentList() {
  const el = document.getElementById('student-list');
  const classId = parseInt(document.getElementById('class-select').value);
  const cls = state.classes.find(c => c.id === classId);
  el.innerHTML = '';
  if (!cls || !cls.students.length) { el.innerHTML = '<div style="color:var(--text3);font-size:14px;padding:8px 0">No students yet.</div>'; return; }
  cls.students.forEach(name => {
    const d = document.createElement('div');
    d.className = 'setup-list-item';
    d.innerHTML = `<div class="setup-list-text" style="flex:1">${esc(name)}</div>
      <div class="list-del" onclick="removeStudent(${cls.id},'${name.replace(/'/g,"\\'")}')">✕</div>`;
    el.appendChild(d);
  });
}
function removeStudent(classId, name) {
  const cls = state.classes.find(c => c.id === classId);
  if (cls) { cls.students = cls.students.filter(s => s !== name); save(); renderStudentList(); renderClassList(); }
}
function switchTab(tab) {
  document.getElementById('setup-classes').style.display = tab === 'classes' ? 'block' : 'none';
  document.getElementById('setup-students').style.display = tab === 'students' ? 'block' : 'none';
  document.getElementById('tab-classes').className = 'setup-tab' + (tab==='classes'?' active':'');
  document.getElementById('tab-students').className = 'setup-tab' + (tab==='students'?' active':'');
  if (tab === 'students') updateClassSelect();
}

document.getElementById('new-student').addEventListener('keydown', e => { if(e.key==='Enter') addStudent(); });
document.getElementById('new-class-name').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('new-class-subject').focus(); });
document.getElementById('new-class-subject').addEventListener('keydown', e => { if(e.key==='Enter') addClass(); });

/* INIT */
load();
if (!state.watchlist) state.watchlist = {};
if (!state.currentTerm) state.currentTerm = 2;
if (!state.currentWeek) state.currentWeek = 2;

if (!state.classes.length) {
  state.classes.push({
    id: 1000000001, name: '1HIA', subject: 'History',
    students: [
      'Lakshya','Enyue','Danif','Aqil','Qi Xian','Clayton','Javier',
      'Cherbelle','Kingsley','Hongbo','Luth','Michael','Mani','Sree',
      'Jayden','Ignatius','Lewis','Jia Xuan','Ying Xin','Caden',
      'Dhaniyah','Scarlett','Eryna','Shafinah','Aomi'
    ]
  });
  save();
}
renderHome();

/* ---- PWA SETUP ---- */
(function() {
  function makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#2A6ED4';
    const r = size * 0.22;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size-r);
    ctx.quadraticCurveTo(size, size, size-r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size-r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fill();
    const cols = 3, rows = 4;
    const pad = size * 0.18;
    const dotR = size * 0.055;
    const cellW = (size - pad*2) / cols;
    const cellH = (size - pad*2) / rows;
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const x = pad + col * cellW + cellW/2;
        const y = pad + row * cellH + cellH/2;
        ctx.fillStyle = (row===1&&col===1) ? '#F5907E' : (row===2&&col===2) ? '#F0B060' : '#FFFFFF';
        ctx.globalAlpha = (row===3&&col===2) ? 0.3 : 0.9;
        ctx.beginPath(); ctx.arc(x, y, dotR, 0, Math.PI*2); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    return c.toDataURL('image/png');
  }

  const icon192 = makeIcon(192);
  const icon512 = makeIcon(512);
  document.getElementById('apple-touch-icon').href = icon192;

  const manifest = {
    name: 'Class Behaviour Tracker', short_name: 'Class Tracker',
    start_url: '.', display: 'standalone',
    background_color: '#F5F4F0', theme_color: '#2A6ED4', orientation: 'portrait',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png' },
      { src: icon512, sizes: '512x512', type: 'image/png' }
    ]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(mBlob);

  const swCode = `const CACHE='ctss-v1';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(cached=>{
    if(cached)return cached;
    return fetch(e.request).then(res=>{
      if(!res||res.status!==200)return res;
      const clone=res.clone();
      caches.open(CACHE).then(c=>c.put(e.request,clone));
      return res;
    }).catch(()=>cached);
  }));
});`;

  if ('serviceWorker' in navigator) {
    const swBlob = new Blob([swCode], {type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob), {scope:'./'}).catch(()=>{});
  }

  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (!isStandalone && !localStorage.getItem('pwa-dismissed')) {
    setTimeout(() => {
      const b = document.createElement('div');
      b.innerHTML = `<div style="display:flex;align-items:center;gap:10px;flex:1"><div style="font-size:22px">📲</div><div><div style="font-size:13px;font-weight:600;color:var(--text)">Add to Home Screen</div><div style="font-size:12px;color:var(--text2);margin-top:2px">Tap <strong>Share ↑</strong> then <strong>Add to Home Screen</strong></div></div></div><button onclick="this.parentNode.remove();localStorage.setItem('pwa-dismissed','1')" style="background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;padding:4px 8px">✕</button>`;
      b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border2);padding:14px;display:flex;align-items:center;gap:10px;z-index:30;font-family:var(--font);box-shadow:0 -4px 20px rgba(0,0,0,0.08)';
      document.body.appendChild(b);
    }, 2000);
  }
})();
